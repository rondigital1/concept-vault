name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: knowledge
          POSTGRES_PASSWORD: knowledge
          POSTGRES_DB: concept_vault
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U knowledge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AUTH_GOOGLE_ID: test-google-id
      AUTH_GOOGLE_SECRET: test-google-secret
      AUTH_SECRET: test-auth-secret
      CRON_SECRET: test-cron-secret
      DATABASE_URL: postgresql://knowledge:knowledge@localhost:5432/concept_vault
      OPENAI_API_KEY: test-openai-key
      OWNER_EMAIL: ci@example.com
      TAVILY_API_KEY: test-tavily-key
      TEST_DATABASE_URL: postgresql://knowledge:knowledge@localhost:5432/concept_vault_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U knowledge; do
            sleep 1
          done

      - name: Initialize schema
        run: npm run db:init

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Release smoke checks
        env:
          SMOKE_BASE_URL: http://127.0.0.1:3000
          SMOKE_CRON_SECRET: test-cron-secret
        run: |
          npm run start > /tmp/concept-vault-smoke.log 2>&1 &
          APP_PID=$!

          cleanup() {
            kill "$APP_PID" >/dev/null 2>&1 || true
            wait "$APP_PID" >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          for attempt in $(seq 1 30); do
            if curl --silent --show-error --output /dev/null --location --max-time 5 "$SMOKE_BASE_URL/"; then
              npm run smoke:release -- --base-url "$SMOKE_BASE_URL"
              exit 0
            fi

            sleep 1
          done

          echo "Application failed to boot for release smoke checks"
          cat /tmp/concept-vault-smoke.log
          exit 1
